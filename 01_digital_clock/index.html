<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <title>Digital Clock || Polok Banik</title>
    </head>
    <body>
        <div class="container">
            <div class="clock-card">
                <h1>Digital Clock</h1>

                <div class="clock">
                    <span id="hours">00</span>
                    <span>:</span>
                    <span id="minutes">00</span>
                    <span>:</span>
                    <span id="seconds">00</span>
                </div>

                <p class="date">Monday, 02 June 2026</p>
            </div>
        </div>

        <script src="app.js"></script>
    </body>
</html>
