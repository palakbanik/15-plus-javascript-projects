<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <title>Quiz app || Palak Banik</title>
    </head>
    <body>
        <div class="main">
            <h1>Quiz App</h1>
            <div id="box">
                <h2 id="question">1. This is dummy question.</h2>

                <div class="row">
                    <input
                        class="options"
                        id="option1"
                        type="radio"
                        value="a"
                        name="option"
                    />
                    <label for="option1"> Option 1</label>
                </div>
                <div class="row">
                    <input
                        class="options"
                        id="option2"
                        type="radio"
                        value="b"
                        name="option"
                    />
                    <label for="option2"> Option 2</label>
                </div>
                <div class="row">
                    <input
                        class="options"
                        id="option3"
                        type="radio"
                        value="c"
                        name="option"
                    />
                    <label for="option3"> Option 3</label>
                </div>
                <div class="row">
                    <input
                        class="options"
                        id="option4"
                        type="radio"
                        value="d"
                        name="option"
                    />
                    <label for="option4"> Option 4</label>
                </div>

                <button id="btn" onclick="quizSubmit()">Submit</button>
            </div>

            <div class="score">
                Score: <span id="score">00</span> /
                <span id="score-len">05</span>
            </div>
        </div>

        <script src="./app.js"></script>
    </body>
</html>
