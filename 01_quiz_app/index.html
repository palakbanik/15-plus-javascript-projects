<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <title>Quiz App || Palak Banik</title>
    </head>
    <body>
        <div class="container">
            <!-- active screen -->
            <div class="screen active" id="start-screen">
                <h1>Quiz Time!</h1>
                <p>Test your knowledge with this fun questions</p>
                <button id="start-btn">Start Quiz</button>
            </div>

            <!-- quiz screen -->
            <div class="screen" id="quiz-screen">
                <!-- quiz header -->
                <div class="quiz-header">
                    <h2 id="question-text">Question goes here...</h2>

                    <div class="quiz-info">
                        <p>
                            Question <span id="current-question">1</span> of
                            <span id="total-questions">5</span>
                        </p>

                        <p>Score: <span id="score">0</span></p>
                    </div>
                </div>

                <!-- answers container -->
                <div id="answers-container" class="answers-container">
                    <!-- answers buttons will be insert here by js code -->
                </div>

                <!-- progress bar -->
                <div class="progress-bar">
                    <div class="progress" id="progress"></div>
                </div>
            </div>

            <!-- result screen -->
            <div class="screen" id="result-screen">
                <h1>Quiz Result</h1>
                <div class="result-info">
                    <p>
                        You scored <span id="final-score">0</span> out of
                        <span id="max-score">5</span>
                    </p>

                    <div id="result-message">Good Job!</div>
                </div>
                <button id="restart-btn">Restart Quiz</button>
            </div>
        </div>

        <!-- script file -->
        <script src="script.js"></script>
    </body>
</html>
